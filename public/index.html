<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My DevOps Todo App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0f0f1a;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 20px;
    color: white;
  }

  .header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .header h1 {
    font-size: 2.2rem;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .header p {
    color: rgba(255,255,255,0.5);
    font-size: 0.85rem;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
    flex-wrap: wrap;
  }

  .stat-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 12px 24px;
    text-align: center;
    min-width: 90px;
  }

  .stat-card .num { font-size: 1.6rem; font-weight: bold; }
  .stat-card .label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .stat-card.total .num { color: #4facfe; }
  .stat-card.done .num { color: #43e97b; }
  .stat-card.pending .num { color: #f093fb; }
  .stat-card.high .num { color: #f5576c; }

  .add-section {
    max-width: 700px;
    margin: 0 auto 30px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
  }

  .add-section h3 {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .input-grid input, .input-grid select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-grid input:focus, .input-grid select:focus {
    border-color: #4facfe;
  }

  .input-grid select option { background: #1a1a2e; }

  .task-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .task-input-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .task-input-row input:focus { border-color: #4facfe; }
  .task-input-row input::placeholder { color: rgba(255,255,255,0.3); }

  .add-btn {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .add-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(79,172,254,0.4);
  }

  .filter-row {
    max-width: 700px;
    margin: 0 auto 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: rgba(255,255,255,0.12);
    color: white;
    border-color: rgba(255,255,255,0.3);
  }

  .todos-grid {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .todo-card {
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-left: 4px solid transparent;
    transition: all 0.3s;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .todo-card.priority-high {
    background: rgba(245, 87, 108, 0.1);
    border-left-color: #f5576c;
  }

  .todo-card.priority-medium {
    background: rgba(79, 172, 254, 0.1);
    border-left-color: #4facfe;
  }

  .todo-card.priority-low {
    background: rgba(67, 233, 123, 0.1);
    border-left-color: #43e97b;
  }

  .todo-card.done {
    opacity: 0.5;
  }

  .todo-card:hover {
    transform: translateX(4px);
    filter: brightness(1.1);
  }

  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 13px;
  }

  .checkbox.checked {
    background: #43e97b;
    border-color: #43e97b;
  }

  .todo-content { flex: 1; }

  .todo-text {
    font-size: 15px;
    margin-bottom: 6px;
    word-break: break-word;
  }

  .todo-card.done .todo-text {
    text-decoration: line-through;
    color: rgba(255,255,255,0.4);
  }

  .todo-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
  }

  .badge.priority-high { background: rgba(245,87,108,0.25); color: #f5576c; }
  .badge.priority-medium { background: rgba(79,172,254,0.25); color: #4facfe; }
  .badge.priority-low { background: rgba(67,233,123,0.25); color: #43e97b; }
  .badge.category { background: rgba(240,147,251,0.2); color: #f093fb; }
  .badge.due { background: rgba(255,200,100,0.2); color: #ffc864; font-size: 11px; }
  .badge.overdue { background: rgba(245,87,108,0.3); color: #f5576c; }

  .delete-btn {
    background: rgba(245,87,108,0.15);
    border: 1px solid rgba(245,87,108,0.3);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    color: #f5576c;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .delete-btn:hover {
    background: rgba(245,87,108,0.3);
    transform: scale(1.1);
  }

  .empty {
    text-align: center;
    padding: 50px 0;
    color: rgba(255,255,255,0.3);
    font-size: 1rem;
  }

  .empty span { font-size: 3rem; display: block; margin-bottom: 10px; }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="header">
  <h1>✨ My DevOps Todo App</h1>
  <p>Built with Node.js • Docker • Kubernetes • Jenkins</p>
</div>

<div class="stats-row">
  <div class="stat-card total">
    <div class="num" id="totalCount">0</div>
    <div class="label">📋 Total</div>
  </div>
  <div class="stat-card done">
    <div class="num" id="doneCount">0</div>
    <div class="label">✅ Done</div>
  </div>
  <div class="stat-card pending">
    <div class="num" id="pendingCount">0</div>
    <div class="label">⏳ Pending</div>
  </div>
  <div class="stat-card high">
    <div class="num" id="highCount">0</div>
    <div class="label">🔴 High</div>
  </div>
</div>

<div class="add-section">
  <h3>➕ Add New Task</h3>
  <div class="task-input-row">
    <input type="text" id="todoInput" placeholder="What needs to be done?">
    <button class="add-btn" onclick="addTodo()">Add Task</button>
  </div>
  <div class="input-grid">
    <select id="priorityInput">
      <option value="high">🔴 High Priority</option>
      <option value="medium" selected>🔵 Medium Priority</option>
      <option value="low">🟢 Low Priority</option>
    </select>
    <input type="text" id="categoryInput" placeholder="📁 Category (e.g. DevOps, Work)">
    <input type="date" id="dueDateInput">
    <select id="filterSelect" onchange="renderTodos()">
      <option value="all">📋 Show All</option>
      <option value="pending">⏳ Pending Only</option>
      <option value="done">✅ Done Only</option>
      <option value="high">🔴 High Priority</option>
    </select>
  </div>
</div>

<div class="todos-grid" id="todoList"></div>

<script>
let allTodos = [];

async function fetchTodos() {
  const res = await fetch('/api/todos');
  allTodos = await res.json();
  renderTodos();
}

function renderTodos() {
  const filter = document.getElementById('filterSelect').value;
  let todos = [...allTodos];

  if (filter === 'pending') todos = todos.filter(t => !t.done);
  else if (filter === 'done') todos = todos.filter(t => t.done);
  else if (filter === 'high') todos = todos.filter(t => t.priority === 'high');

  // Sort: high priority first, then by due date
  todos.sort((a, b) => {
    const pOrder = { high: 0, medium: 1, low: 2 };
    if (pOrder[a.priority] !== pOrder[b.priority]) return pOrder[a.priority] - pOrder[b.priority];
    if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return 0;
  });

  // Update stats
  document.getElementById('totalCount').textContent = allTodos.length;
  document.getElementById('doneCount').textContent = allTodos.filter(t => t.done).length;
  document.getElementById('pendingCount').textContent = allTodos.filter(t => !t.done).length;
  document.getElementById('highCount').textContent = allTodos.filter(t => t.priority === 'high' && !t.done).length;

  const list = document.getElementById('todoList');
  if (todos.length === 0) {
    list.innerHTML = '<div class="empty"><span>🎯</span>No tasks here! Add one above.</div>';
    return;
  }

  list.innerHTML = '';
  todos.forEach(todo => {
    const card = document.createElement('div');
    card.className = `todo-card priority-${todo.priority} ${todo.done ? 'done' : ''}`;

    const today = new Date().toISOString().split('T')[0];
    let dueBadge = '';
    if (todo.dueDate) {
      const isOverdue = !todo.done && todo.dueDate < today;
      dueBadge = `<span class="badge ${isOverdue ? 'overdue' : 'due'}">
        ${isOverdue ? '⚠️ Overdue' : '📅'} ${todo.dueDate}
      </span>`;
    }

    card.innerHTML = `
      <div class="checkbox ${todo.done ? 'checked' : ''}" onclick="toggleTodo(${todo.id}, ${!todo.done})">
        ${todo.done ? '✓' : ''}
      </div>
      <div class="todo-content">
        <div class="todo-text">${todo.text}</div>
        <div class="todo-meta">
          <span class="badge priority-${todo.priority}">${
            todo.priority === 'high' ? '🔴 High' :
            todo.priority === 'medium' ? '🔵 Medium' : '🟢 Low'
          }</span>
          ${todo.category ? `<span class="badge category">📁 ${todo.category}</span>` : ''}
          ${dueBadge}
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTodo(${todo.id})">🗑</button>
    `;
    list.appendChild(card);
  });
}

async function addTodo() {
  const text = document.getElementById('todoInput').value.trim();
  if (!text) return;

  await fetch('/api/todos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      priority: document.getElementById('priorityInput').value,
      category: document.getElementById('categoryInput').value.trim() || 'General',
      dueDate: document.getElementById('dueDateInput').value || null
    })
  });

  document.getElementById('todoInput').value = '';
  document.getElementById('dueDateInput').value = '';
  fetchTodos();
}

async function toggleTodo(id, done) {
  await fetch(`/api/todos/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ done })
  });
  fetchTodos();
}

async function deleteTodo(id) {
  await fetch(`/api/todos/${id}`, { method: 'DELETE' });
  fetchTodos();
}

document.getElementById('todoInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') addTodo();
});

fetchTodos();
</script>
</body>
</html>
