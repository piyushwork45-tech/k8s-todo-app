<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My DevOps Todo App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 36px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.3);
  }

  h1 {
    text-align: center;
    color: white;
    font-size: 2rem;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 0.85rem;
    margin-bottom: 28px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 18px;
    font-size: 15px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    background: rgba(255,255,255,0.2);
    color: white;
    outline: none;
    transition: all 0.3s;
  }

  input[type="text"]::placeholder { color: rgba(255,255,255,0.7); }
  input[type="text"]:focus {
    border-color: white;
    background: rgba(255,255,255,0.3);
  }

  .add-btn {
    padding: 14px 22px;
    font-size: 22px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(240,93,251,0.4);
  }

  .add-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(240,93,251,0.6);
  }

  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
  }

  .stat {
    text-align: center;
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 10px 20px;
  }

  .stat-num { font-size: 1.5rem; font-weight: bold; color: white; }
  .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.8); }

  ul { list-style: none; max-height: 380px; overflow-y: auto; padding-right: 4px; }

  ul::-webkit-scrollbar { width: 6px; }
  ul::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
  ul::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 10px; }

  li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.2);
    padding: 14px 16px;
    margin-bottom: 10px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.25);
    transition: all 0.3s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  li:hover { background: rgba(255,255,255,0.28); transform: translateX(4px); }
  li.done { opacity: 0.6; }
  li.done span { text-decoration: line-through; color: rgba(255,255,255,0.6); }

  .left { display: flex; align-items: center; gap: 12px; flex: 1; }

  .checkbox {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
    font-size: 13px;
  }

  .checkbox.checked {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    border-color: transparent;
    box-shadow: 0 2px 10px rgba(67,233,123,0.5);
  }

  li span { color: white; font-size: 15px; flex: 1; }

  .delete-btn {
    background: linear-gradient(135deg, #f5576c, #f093fb);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(245,87,108,0.4);
  }

  .delete-btn:hover {
    transform: scale(1.15) rotate(10deg);
    box-shadow: 0 4px 12px rgba(245,87,108,0.6);
  }

  .empty {
    text-align: center;
    color: rgba(255,255,255,0.6);
    padding: 30px 0;
    font-size: 2rem;
  }

  .empty p { font-size: 0.9rem; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>✨ My DevOps Todo App</h1>
  <p class="subtitle">Built with Node.js • Docker • Kubernetes • Jenkins</p>

  <div class="input-row">
    <input type="text" id="todoInput" placeholder="🚀 Add a new task...">
    <button class="add-btn" onclick="addTodo()">➕</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">📋 Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">✅ Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pendingCount">0</div>
      <div class="stat-label">⏳ Pending</div>
    </div>
  </div>

  <ul id="todoList"></ul>
</div>

<script>
async function fetchTodos() {
  const res = await fetch('/api/todos');
  const todos = await res.json();
  const list = document.getElementById('todoList');

  document.getElementById('totalCount').textContent = todos.length;
  document.getElementById('doneCount').textContent = todos.filter(t => t.done).length;
  document.getElementById('pendingCount').textContent = todos.filter(t => !t.done).length;

  if (todos.length === 0) {
    list.innerHTML = '<div class="empty">🎯<p>No tasks yet! Add one above.</p></div>';
    return;
  }

  list.innerHTML = '';
  todos.forEach(todo => {
    const li = document.createElement('li');
    li.className = todo.done ? 'done' : '';
    li.innerHTML = `
      <div class="left">
        <div class="checkbox ${todo.done ? 'checked' : ''}" onclick="toggleTodo(${todo.id}, ${!todo.done})">
          ${todo.done ? '✓' : ''}
        </div>
        <span>${todo.text}</span>
      </div>
      <button class="delete-btn" onclick="deleteTodo(${todo.id})">🗑</button>
    `;
    list.appendChild(li);
  });
}

async function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  await fetch('/api/todos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  input.value = '';
  fetchTodos();
}

async function toggleTodo(id, done) {
  await fetch(`/api/todos/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ done })
  });
  fetchTodos();
}

async function deleteTodo(id) {
  await fetch(`/api/todos/${id}`, { method: 'DELETE' });
  fetchTodos();
}

document.getElementById('todoInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') addTodo();
});

fetchTodos();
</script>
</body>
</html>
